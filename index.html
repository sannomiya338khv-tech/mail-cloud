  <script>
    (function(){
      var c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#ea580c';
      ctx.fillRect(0, 0, 512, 512);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 32;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.strokeRect(96, 144, 320, 224);
      ctx.beginPath(); 
      ctx.moveTo(96, 144); 
      ctx.lineTo(256, 272); 
      ctx.lineTo(416, 144); 
      ctx.stroke();
      
      var dataUrl = c.toDataURL('image/png');
      var icon = document.createElement('link'); 
      icon.rel = 'icon'; icon.type = 'image/png'; icon.href = dataUrl;
      document.head.appendChild(icon);
      var appleIcon = document.createElement('link'); 
      appleIcon.rel = 'apple-touch-icon'; appleIcon.href = dataUrl;
      document.head.appendChild(appleIcon);

      var manifest = {
        name: "Mail Cloud",
        short_name: "Mail Cloud",
        display: "standalone",
        start_url: ".",
        theme_color: "#ea580c",
        background_color: "#ffffff",
        icons: [
          { src: dataUrl, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };
      var manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
      document.head.appendChild(manifestLink);
    })();
  </script>

    const fetchWithRetry = async (url, options, maxRetries = 2) => {
      const delays = [1000, 2000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errText = await response.text();
            let errMsg = errText;
            try {
              const errJson = JSON.parse(errText);
              if (errJson.error && errJson.error.message) {
                errMsg = errJson.error.message;
              }
            } catch(e) {}
            throw new Error(`HTTP ${response.status}: ${errMsg}`);
          }
          return response;
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

              <div className="sm:col-span-2"><label className="block text-[10px] font-bold text-gray-400 mb-1">担当者</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-purple-500" /></div>
              <div className="sm:col-span-3"><label className="block text-[10px] font-bold text-gray-400 mb-1">メール</label><input required type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-purple-500" /></div>
              <div className="sm:col-span-2 flex items-end"><button type="submit" className="w-full bg-purple-600 text-white p-2 rounded font-bold shadow-sm hover:bg-purple-700 transition-colors">登録</button></div>

    // --- メインアプリ ---
    function App() {
      const [db, setDb] = useState(null); 
      const [user, setUser] = useState(null);
      const [configInput, setConfigInput] = useState(""); 
      
      const configKey = "firebase_config_master";
      const settingsKey = "mail_app_local_settings_master";
      const appId = "mail-template-app"; 

      const [isConfigured, setIsConfigured] = useState(() => !!localStorage.getItem(configKey));
      const [appError, setAppError] = useState(null); 
      const [templates, setTemplates] = useState([]); 
      const [agencies, setAgencies] = useState([]);
      
      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem(settingsKey);
        return saved ? JSON.parse(saved) : { mediaList: ['すまいステップ', 'リビンマッチ'], companyName: '', staffName: '', mobilePhone: '', officePhone: '', geminiApiKey: '' };
      });

      useEffect(() => { localStorage.setItem(settingsKey, JSON.stringify(settings)); }, [settings]);

      const [activeCategory, setActiveCategory] = useState('satei_initial'); 
      const [currentView, setCurrentView] = useState('templates');
      const [searchQuery, setSearchQuery] = useState(''); 
      const [editingTemplate, setEditingTemplate] = useState(null);
      const [notification, setNotification] = useState(null); 
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [actionModal, setActionModal] = useState(null); 
      const [modalInputs, setModalInputs] = useState({});
      const [newMediaInput, setNewMediaInput] = useState('');

      const resetFirebaseConfig = () => {
        if (confirm("Firebaseの設定をリセットして初期の黒い画面に戻りますか？")) {
          localStorage.removeItem(configKey);
          window.location.reload();
        }
      };

      useEffect(() => {
        const savedConfig = localStorage.getItem(configKey);
        if (savedConfig) {
          try {
            const config = JSON.parse(savedConfig); 
            if (!firebase.apps.length) firebase.initializeApp(config);
            const _db = firebase.firestore(); setDb(_db);
            firebase.auth().signInAnonymously().catch(e => setAppError(e.message));
            return firebase.auth().onAuthStateChanged((u) => setUser(u));
          } catch (e) { localStorage.removeItem(configKey); setIsConfigured(false); }
        }
      }, [isConfigured]);

      useEffect(() => {
        if (!db || !user) return;
        const unsubT = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('templates').onSnapshot(s => setTemplates(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubA = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('agencies').onSnapshot(s => setAgencies(s.docs.map(d => ({id: d.id, ...d.data()}))));
        return () => { unsubT(); unsubA(); };
      }, [db, user]);

      const handleConfigSubmit = () => {
        try {
          const api = configInput.match(/apiKey["'\s:=]+([^"',\s}]+)/i);
          const prj = configInput.match(/projectId["'\s:=]+([^"',\s}]+)/i);
          const aid = configInput.match(/appId["'\s:=]+([^"',\s}]+)/i);
          if (!api || !prj || !aid) throw new Error("形式が違います。");
          const config = { apiKey: api[1], authDomain: prj[1]+".firebaseapp.com", projectId: prj[1], storageBucket: prj[1]+".appspot.com", appId: aid[1] };
          localStorage.setItem(configKey, JSON.stringify(config)); setIsConfigured(true);
        } catch (e) { alert(e.message); }
      };

      const saveToCloud = async (t) => {
        const id = t.id || crypto.randomUUID();
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('templates').doc(id.toString()).set({ ...t, id });
        setEditingTemplate(null); showNotification("保存しました");
      };
      
      const deleteFromCloud = async (id) => { if (confirm("削除しますか？")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('templates').doc(id.toString()).delete(); };
      const saveAgencyToCloud = async (a) => { const id = a.id || crypto.randomUUID(); await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('agencies').doc(id.toString()).set({ ...a, id }); showNotification("業者を追加しました"); };
      const deleteAgencyFromCloud = async (id) => { if (confirm("削除しますか？")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('agencies').doc(id.toString()).delete(); };
      const updateAgencyInCloud = async (id, data) => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('agencies').doc(id.toString()).update(data); };
      const showNotification = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
      const executeCopy = (text, label) => { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showNotification(`${label}をコピーしました`); };
      
      const handleCopyRequest = (text, label) => {
        const matches = text.match(/［.+?］/g); const filtered = matches ? matches.filter(m => !['［業者会社名］','［業者担当者名］'].includes(m)) : null;
        if (filtered && filtered.length > 0) { const unique = [...new Set(filtered)]; setModalInputs(Object.fromEntries(unique.map(ph => [ph, '']))); setActionModal({ type: 'copy', text, label, placeholders: unique }); }
        else executeCopy(text, label);
      };
      
      const executeSendToAgency = (template, agency, inputs = {}) => {
        let body = template.body;
        let subject = template.subject;

        Object.keys(inputs).forEach(ph => {
          body = body.split(ph).join(inputs[ph] || ph);
          subject = subject.split(ph).join(inputs[ph] || ph);
        });

        body = body.replace(/［業者会社名］/g, agency.company).replace(/［業者担当者名］/g, agency.name || '担当者');
        subject = subject.replace(/［業者会社名］/g, agency.company).replace(/［業者担当者名］/g, agency.name || '担当者');

        const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(agency.email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        window.open(url, '_blank'); 
      };

      const handleSendToAgencyRequest = (template, agency) => {
        const combinedText = (template.subject || '') + '\n' + (template.body || '');
        const matches = combinedText.match(/［.+?］/g);
        const filtered = matches ? matches.filter(m => !['［業者会社名］','［業者担当者名］'].includes(m)) : null;
        
        if (filtered && filtered.length > 0) {
          const unique = [...new Set(filtered)];
          setModalInputs(Object.fromEntries(unique.map(ph => [ph, ''])));
          setActionModal({ type: 'gmail', template, agency, placeholders: unique });
        } else {
          executeSendToAgency(template, agency, {});
        }
      };

      if (!isConfigured) return (
        <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center p-6 text-center">
          <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <h2 className="text-2xl font-bold mb-4 text-orange-500">Firebase設定</h2>
            <p className="text-xs text-slate-400 mb-6 font-bold">設定コードを貼り付けてください</p>
            <textarea className="w-full h-48 p-4 bg-slate-900 border border-slate-700 rounded-lg font-mono text-xs mb-4 outline-none focus:ring-2 focus:ring-orange-500 text-white" placeholder="firebaseConfig の中身を貼り付け" value={configInput} onChange={e => setConfigInput(e.target.value)} />
            <button onClick={handleConfigSubmit} className="w-full bg-orange-600 py-3 rounded-lg font-bold shadow-lg hover:bg-orange-500 transition-colors text-white">設定を保存して開始</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-[100dvh] bg-gray-50 flex flex-col md:flex-row relative">
          {appError && <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm"><div className="bg-white rounded-xl p-6 max-w-lg w-full text-red-600 font-bold"><pre className="text-sm whitespace-pre-wrap">{appError}</pre><button onClick={() => setAppError(null)} className="mt-4 w-full bg-slate-800 text-white py-2 rounded">閉じる</button></div></div>}
          {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)} />}
          <aside className={`fixed pt-safe inset-y-0 left-0 z-50 w-72 bg-slate-800 text-white flex flex-col transform md:relative md:translate-x-0 md:w-64 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300`}>
            <div className="p-6 flex justify-between items-center"><h1 className="text-xl font-bold flex items-center gap-2 text-orange-400"><Send size={24} /> Mail Cloud</h1><button className="md:hidden" onClick={() => setIsMobileMenuOpen(false)}><X size={24} /></button></div>
            <nav className="px-2 pb-4 overflow-y-auto flex-1 custom-scrollbar">{CATEGORY_GROUPS.map(group => (
                <div key={group.id} className="mb-6">{group.label && <h3 className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2 px-4">{group.label}</h3>}
                  <div className="space-y-1">{group.items.map(cat => (
                      <button key={cat.id} onClick={() => { setCurrentView('templates'); setActiveCategory(cat.id); setEditingTemplate(null); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-colors ${currentView === 'templates' && activeCategory === cat.id ? 'bg-orange-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}>{cat.icon}{cat.name}</button>))}</div></div>))}
              <div className="mt-4 border-t border-slate-700 pt-4 px-2"><button onClick={() => { setCurrentView('agencies'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold transition-colors ${currentView === 'agencies' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}><Users size={18} /> 🏢 業者アドレス帳</button></div>
            </nav>
            <div className="p-4 border-t border-slate-700 pb-safe">
              <button onClick={() => { setCurrentView('templates'); setEditingTemplate({ title: '', category: activeCategory==='all'?'satei_initial':activeCategory, subject: '', body: '' }); setIsMobileMenuOpen(false); }} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-bold shadow-md mb-4 transition-colors"><Plus size={18} /> 新規作成</button>
              <button onClick={resetFirebaseConfig} className="w-full text-[10px] text-slate-400 hover:text-red-400 font-bold flex items-center justify-center gap-1 transition-colors"><RotateCcw size={10}/> 接続設定をリセット</button>
            </div>
          </aside>
          <main className="flex-1 h-[100dvh] overflow-hidden flex flex-col pt-safe relative">
            <header className="bg-white border-b p-4 shadow-sm z-10 sticky top-0 flex flex-col sm:flex-row justify-between sm:items-center gap-4 text-gray-800">
              <div className="flex items-center gap-3"><button className="md:hidden p-2 text-gray-600" onClick={() => setIsMobileMenuOpen(true)}><Menu size={24} /></button><h2 className="text-lg font-bold">{currentView === 'agencies' ? '🏢 業者アドレス帳' : (ALL_CATEGORIES.find(c => c.id === activeCategory)?.name || 'すべて')}</h2></div>
              {currentView === 'templates' && <div className="relative w-full sm:w-80 text-gray-400"><Search className="absolute left-3 top-1/2 -translate-y-1/2" size={18} /><input type="text" placeholder="検索..." className="w-full pl-10 pr-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-orange-500 text-gray-800 text-base" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} /></div>}
            </header>
            <div className="flex-1 overflow-y-auto bg-gray-50 pb-safe px-4 md:px-6 py-4">
              {currentView === 'agencies' ? <AgencyManager agencies={agencies} onAdd={saveAgencyToCloud} onDelete={deleteAgencyFromCloud} onUpdate={updateAgencyInCloud} showNotification={showNotification} /> : (
                <>{!editingTemplate && <div className="bg-white border rounded-xl shadow-sm mb-6 p-4 max-w-5xl mx-auto"><details className="group"><summary className="cursor-pointer font-bold text-gray-700 flex items-center justify-between outline-none text-gray-800"><span className="flex items-center gap-2"><SettingsIcon size={18} className="text-orange-500" /> 基本設定（端末ごとに保存）</span><ChevronDown className="group-open:rotate-180 transition-transform text-gray-400" size={18} /></summary>
                        <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 pb-2 text-gray-800">
                          {[["自社名", "companyName"], ["担当者名", "staffName"], ["携帯", "mobilePhone"], ["事務所", "officePhone"]].map(([label, key]) => (
                            <div key={key}><label className="block text-[10px] font-bold text-gray-400 mb-1">{label}</label><input type="text" value={settings[key] || ''} onChange={e => setSettings({...settings, [key]: e.target.value})} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-orange-500 text-gray-700" /></div>))}
                          <div className="sm:col-span-2 md:col-span-4 border-t border-gray-100 pt-3 mt-2">
                            <label className="block text-[10px] font-bold text-orange-500 mb-1">🤖 Gemini APIキー (AI生成用)</label>
                            <input type="password" value={settings.geminiApiKey || ''} onChange={e => setSettings({...settings, geminiApiKey: e.target.value})} placeholder="取得したAPIキーを貼り付け" className="w-full p-2 border border-orange-200 rounded text-sm outline-none focus:ring-1 focus:ring-orange-500 text-gray-700 bg-orange-50" />
                          </div>
                        </div></details></div>}
                  <div className="max-w-5xl mx-auto">{editingTemplate ? <Editor template={editingTemplate} onSave={saveToCloud} onCancel={() => setEditingTemplate(null)} categories={CATEGORY_GROUPS} showNotification={showNotification} settings={settings} /> : 
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20">{templates.filter(t => (activeCategory === 'all' || t.category === activeCategory) && (t.title.includes(searchQuery)||t.body.includes(searchQuery))).map(t => (
                          <TemplateCard key={t.id} template={{...t, subject: t.subject.replace(/［自社名］/g, settings.companyName).replace(/［担当者名］/g, settings.staffName).replace(/［携帯電話番号］/g, settings.mobilePhone).replace(/［事務所電話番号］/g, settings.officePhone), body: t.body.replace(/［自社名］/g, settings.companyName).replace(/［担当者名］/g, settings.staffName).replace(/［携帯電話番号］/g, settings.mobilePhone).replace(/［事務所電話番号］/g, settings.officePhone)}} originalTemplate={t} agencies={agencies} onSendToAgency={handleSendToAgencyRequest} onCopy={handleCopyRequest} onEdit={setEditingTemplate} onDelete={deleteFromCloud} getCategoryName={id => ALL_CATEGORIES.find(c => c.id === id)?.name} />))}</div>}</div></>)}
            </div>
            {notification && <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-fade-in-up z-50 shadow-2xl transition-all"><Check size={16} className="text-green-400" />{notification}</div>}
            
            {actionModal && <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in-up text-gray-800"><div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 flex flex-col max-h-[90vh]"><h3 className="text-lg font-bold mb-4">未入力項目の設定</h3><div className="overflow-y-auto flex-1 space-y-4 pr-2 mb-4">{actionModal.placeholders.map((ph, idx) => (
                      <div key={idx} className="bg-gray-50 p-4 rounded-lg border border-gray-200"><label className="block text-xs font-bold text-gray-500 mb-2">{ph}</label>
                      {ph === '［媒体名］' ? (
                          <div className="space-y-3">
                            <div className="flex flex-wrap gap-2">{(settings.mediaList || ['すまいステップ', 'リビンマッチ']).map((m, i) => (<button key={i} onClick={() => setModalInputs({...modalInputs, [ph]: m})} className={`px-3 py-2 text-sm font-bold rounded-lg border ${modalInputs[ph]===m?'bg-orange-600 text-white border-orange-600 shadow-md':'bg-white text-orange-600 border-orange-200'}`}>{m}</button>))}</div>
                            <div className="flex gap-2"><input type="text" value={newMediaInput} onChange={e => setNewMediaInput(e.target.value)} className="flex-1 p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-orange-500" placeholder="媒体名を追加" /><button onClick={() => { if(!newMediaInput) return; setSettings({...settings, mediaList: [...(settings.mediaList || []), newMediaInput]}); setNewMediaInput(''); }} className="px-4 py-2 bg-slate-800 text-white rounded text-xs font-bold">追加</button></div>
                          </div>
                        ) : (<input type="text" value={modalInputs[ph] || ''} onChange={e => setModalInputs({...modalInputs, [ph]: e.target.value})} className="w-full p-2 border rounded outline-none text-sm focus:ring-1 focus:ring-orange-500" />)}
                      </div>))}</div>
                  <div className="flex justify-end gap-3 pt-4 border-t">
                    <button onClick={() => setActionModal(null)} className="px-5 py-2 text-gray-400 font-bold">中止</button>
                    <button onClick={() => { 
                      if (actionModal.type === 'copy') {
                        let res = actionModal.text; 
                        actionModal.placeholders.forEach(ph => { res = res.split(ph).join(modalInputs[ph] || ph); }); 
                        executeCopy(res, actionModal.label); 
                      } else if (actionModal.type === 'gmail') {
                        executeSendToAgency(actionModal.template, actionModal.agency, modalInputs);
                      }
                      setActionModal(null); 
                    }} className="px-6 py-2 bg-orange-600 text-white rounded shadow-md flex items-center gap-2 font-bold hover:bg-orange-700 transition-all">
                      {actionModal.type === 'copy' ? <><Copy size={16} /> コピー実行</> : <><Send size={16} /> Gmailを開く</>}
                    </button>
                  </div>
            </div></div>}
          </main>
        </div>
      );
    }

    function TemplateCard({ template, originalTemplate, agencies, onSendToAgency, onCopy, onEdit, onDelete, getCategoryName }) {
      const [isSendMode, setIsSendMode] = useState(false); const [expandedGroup, setExpandedGroup] = useState(null);
      const groupedAgencies = AGENCY_GROUPS.map(gn => ({ name: gn, agencies: (agencies || []).filter(a => (a.group || '一般') === gn) })).filter(g => g.agencies.length > 0);
      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-all duration-200 flex flex-col h-full overflow-hidden text-gray-800">
          <div className="p-4 border-b bg-gray-50/50 flex justify-between items-start">
            <div><div className="flex items-center gap-2 mb-1"><span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold ${template.category === 'agency_template' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700'}`}>{getCategoryName(template.category)}</span>
                {template.category === 'agency_template' && <button onClick={() => setIsSendMode(!isSendMode)} className="text-white text-[10px] font-bold flex items-center gap-1 bg-purple-600 px-2 py-0.5 rounded shadow-sm hover:bg-purple-700 transition-colors"><Mail size={10} /> Gmailパネル</button>}</div><h3 className="font-bold text-gray-800 leading-tight">{template.title}</h3></div>
            <div className="flex gap-1"><button onClick={() => onEdit(originalTemplate)} className="p-2 text-gray-400 hover:text-blue-600 transition-colors"><Edit2 size={18} /></button><button onClick={() => onDelete(template.id)} className="p-2 text-gray-400 hover:text-red-600 transition-colors"><Trash2 size={18} /></button></div>
          </div>
          {isSendMode && template.category === 'agency_template' && (<div className="bg-purple-50 p-3 border-b border-purple-100 shadow-inner">
              <div className="flex justify-between items-center mb-2"><h4 className="text-xs font-bold text-purple-800 flex items-center gap-1"><Mail size={12}/> 送信先の業者を選択</h4><button onClick={() => setIsSendMode(false)} className="text-purple-400 hover:text-purple-700"><X size={16} /></button></div>
              {(!agencies || agencies.length === 0) ? <p className="text-xs text-gray-500 py-2">※先に業者アドレス帳を登録してください。</p> : <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-1 pb-1">
                  {groupedAgencies.map(group => (<div key={group.name} className="border border-purple-200 rounded bg-white overflow-hidden shadow-sm">
                      <button onClick={() => setExpandedGroup(expandedGroup === group.name ? null : group.name)} className="w-full flex justify-between items-center p-2.5 bg-purple-50 hover:bg-purple-100 transition-colors text-gray-800">
                        <span className="text-xs font-bold text-purple-800">{group.name} <span className="text-gray-500 font-normal ml-1">({group.agencies.length})</span></span><ChevronDown size={14} className={`text-purple-500 transition-transform ${expandedGroup === group.name ? 'rotate-180' : ''}`} /></button>
                      {expandedGroup === group.name && <div className="p-1.5 space-y-1.5 bg-white border-t border-purple-100">{group.agencies.map(a => (
                            <button key={a.id} onClick={() => onSendToAgency(template, a)} className="w-full text-left bg-white border border-gray-100 hover:border-purple-300 hover:bg-purple-50 p-2 rounded flex justify-between items-center transition-colors shadow-sm"><div className="flex flex-col overflow-hidden"><span className="text-xs font-bold truncate text-gray-800">{a.company}</span><span className="text-[10px] text-gray-500 truncate">{a.name || '担当者なし'}</span></div><span className="text-[10px] bg-purple-600 text-white px-2 py-1 rounded shadow-sm whitespace-nowrap flex items-center gap-1"><Send size={10} /> Gmail</span></button>))}</div>}</div>))}</div>}</div>)}
          <div className="p-4 flex-1 space-y-4">
            <div><div className="text-[10px] font-bold text-gray-400 mb-1 flex justify-between">件名<button onClick={() => onCopy(template.subject, '件名')} className="text-orange-600 font-bold flex items-center gap-1 hover:text-orange-800 transition-colors"><Copy size={10} />コピー</button></div><div className="bg-gray-50 p-2 rounded border border-gray-100 text-sm text-gray-700 font-medium break-all leading-relaxed">{template.subject || '(件名なし)'}</div></div>
            <div><div className="text-[10px] font-bold text-gray-400 mb-1 flex justify-between">本文<button onClick={() => onCopy(template.body, '本文')} className="text-orange-600 font-bold flex items-center gap-1 hover:text-orange-800 transition-colors"><Copy size={10} />コピー</button></div><div className="bg-gray-50 p-3 rounded border border-gray-100 text-sm text-gray-600 font-mono whitespace-pre-wrap h-40 overflow-y-auto custom-scrollbar leading-relaxed">{template.body}</div></div>
          </div>
        </div>
      );
    }

    function Editor({ template, onSave, onCancel, categories, showNotification, settings }) {
      const [formData, setFormData] = useState({ ...template, id: template.id || crypto.randomUUID() }); 
      const bodyRef = useRef(null);
      const [isSaving, setIsSaving] = useState(false);
      
      const [showAiPanel, setShowAiPanel] = useState(false);
      const [aiPrompt, setAiPrompt] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);

      const insert = ph => { const s = bodyRef.current.selectionStart; const e = bodyRef.current.selectionEnd; const b = formData.body || ''; setFormData({...formData, body: b.substring(0, s) + ph + b.substring(e)}); setTimeout(() => { bodyRef.current.selectionStart = bodyRef.current.selectionEnd = s + ph.length; bodyRef.current.focus(); }, 0); };

      const generateWithAI = async () => {
        if (!aiPrompt.trim()) return showNotification('要望を入力してください');
        
        const apiKey = settings?.geminiApiKey?.trim();
        if (!apiKey) return showNotification('基本設定からGemini APIキーを設定してください');

        setIsGenerating(true);
        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          
          const systemPrompt = "あなたは優秀な不動産営業マンです。ユーザーの要望に応じた丁寧なメールを件名と本文に分けて作成してください。宛名などは［お客様名］などの形式を使用。本文の最後は「よろしくお願いいたします。」などの結びの言葉で終わらせ、会社名や氏名、連絡先などの「署名（シグネチャ）ブロック」は絶対に含めないでください。レスポンスは必ず以下のJSON形式のみを出力： { \"subject\": \"件名\", \"body\": \"本文\" }";
          
          const payload = {
            contents: [{ parts: [{ text: aiPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
          };

          const response = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          
          if (data.error) {
             throw new Error(data.error.message || "APIエラーが発生しました");
          }

          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            const parsed = JSON.parse(jsonMatch ? jsonMatch[0] : text);
            setFormData(prev => ({ ...prev, subject: parsed.subject || prev.subject, body: parsed.body || prev.body }));
            showNotification('AIがメール案を作成しました！');
            setShowAiPanel(false); setAiPrompt('');
          } else {
            throw new Error("AIからの応答が空でした");
          }
        } catch (e) { 
          console.error("Detailed Error:", e);
          const errMsg = e.message.substring(0, 100);
          showNotification(`生成に失敗: ${errMsg}`); 
        } finally { 
          setIsGenerating(false); 
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden animate-fade-in-up text-gray-800">
          <div className="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
            <h3 className="font-bold text-lg flex items-center gap-2">{template.id ? <Edit2 size={20} /> : <Plus size={20} />} {template.id ? '編集' : '新規作成'}</h3>
            <div className="flex items-center gap-4">
              <button type="button" onClick={() => setShowAiPanel(!showAiPanel)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-sm font-bold transition-all ${showAiPanel ? 'bg-orange-600 text-white' : 'bg-slate-700 text-orange-400 hover:bg-slate-600'}`}><Sparkles size={16} /> AIで生成</button>
              <button type="button" onClick={onCancel} className="p-1 hover:bg-slate-700 rounded transition-colors"><X size={24} /></button>
            </div>
          </div>
          {showAiPanel && (
            <div className="bg-orange-50 border-b border-orange-100 p-6 flex flex-col gap-3">
              <textarea value={aiPrompt} onChange={(e) => setAiPrompt(e.target.value)} placeholder="例：1週間返信がない査定依頼者への追客メールを作って" className="w-full p-3 border border-orange-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-500 h-24 resize-none shadow-inner text-gray-800" disabled={isGenerating} />
              <div className="flex justify-end mt-2">
                <button type="button" onClick={generateWithAI} disabled={isGenerating || !aiPrompt.trim()} className={`px-5 py-2 rounded-lg font-bold flex items-center gap-2 transition-all ${isGenerating ? 'bg-orange-300 cursor-not-allowed text-white' : 'bg-orange-600 hover:bg-orange-700 text-white shadow-md active:scale-95'}`}>
                  {isGenerating ? <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> 考案中...</> : <><Sparkles size={16} /> AIに作らせる</>}
                </button>
              </div>
            </div>
          )}
          <form onSubmit={async e => { e.preventDefault(); if (isSaving) return; setIsSaving(true); await onSave(formData); setIsSaving(false); }} className="p-6 space-y-6 text-gray-800 relative">
            {isGenerating && <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center rounded-b-xl"><p className="font-bold text-lg animate-pulse text-orange-600 flex items-center gap-2"><Bot size={32} /> AIが最適な文面を考えています...</p></div>}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div><label className="block text-xs font-bold text-gray-400 mb-1">タイトル</label><input type="text" className="w-full p-3 border rounded-lg font-bold focus:ring-2 focus:ring-blue-500 outline-none" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required disabled={isSaving} /></div>
              <div><label className="block text-xs font-bold text-gray-400 mb-1">カテゴリ</label><select className="w-full p-3 border rounded-lg bg-white font-bold focus:ring-2 focus:ring-blue-500 outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} disabled={isSaving}>{categories.map(g => g.id!=='general'&&<optgroup key={g.id} label={g.label}>{g.items.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</optgroup>)}</select></div>
            </div>
            <div><label className="block text-xs font-bold text-gray-400 mb-1">件名</label><input type="text" className="w-full p-3 border rounded-lg font-bold focus:ring-2 focus:ring-blue-500 outline-none" value={formData.subject} onChange={e => setFormData({...formData, subject: e.target.value})} disabled={isSaving} /></div>
            <div><div className="flex flex-wrap gap-2 mb-2 text-gray-800">{['［お客様名］', '［媒体名］', '［物件のエリア・種別］', '［自社名］', '［担当者名］', '［携帯電話番号］', '［事務所電話番号］', '［業者会社名］', '［業者担当者名］'].map(ph => (<button key={ph} type="button" onClick={() => insert(ph)} className={`text-[10px] bg-white border px-2.5 py-1.5 rounded-lg shadow-sm font-bold ${ph.includes('業者') ? 'text-purple-600 border-purple-200' : 'text-blue-600 border-blue-200'} hover:shadow-md transition-all active:scale-95`} disabled={isSaving}>{ph}</button>))}</div>
              <textarea ref={bodyRef} className="w-full h-80 p-4 border rounded-lg font-mono text-sm outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 custom-scrollbar leading-relaxed" value={formData.body} onChange={e => setFormData({...formData, body: e.target.value})} required disabled={isSaving} /></div>
            <div className="flex justify-end gap-3 pt-4 border-t border-gray-100"><button type="button" onClick={onCancel} className="px-6 py-3 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition-colors" disabled={isSaving}>中止</button><button type="submit" className="px-10 py-3 bg-blue-600 text-white rounded-lg shadow-lg font-bold hover:bg-blue-700 transition-all active:scale-95 disabled:bg-gray-400" disabled={isSaving}>{isSaving ? '保存中...' : '保存して同期'}</button></div>
          </form>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
